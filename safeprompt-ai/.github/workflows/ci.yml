name: CI

# Runs on every push/PR to main: backend tests, frontend lint + build,
# then (only if both pass) a check that both production Docker images
# actually build. Nothing here pushes an image anywhere — that's a
# deliberate separate step (see DEPLOYMENT.md) once you've picked a
# registry/host, so this file stays useful regardless of where you
# eventually deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    # Installing torch/transformers/sentence-transformers/detoxify (see
    # backend/requirements.txt) is by far the slowest part of this job —
    # budget several minutes even with pip's cache warm.
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    env:
      # Forces the regex/keyword fallback paths in the Milestone 7/8
      # detectors (see backend/tests/conftest.py), so the suite doesn't
      # need to actually download any ML models to pass.
      ENABLE_ML_DETECTORS: "False"
      # Dummy but well-formed — every Supabase call in the test suite is
      # mocked (see backend/tests/fake_supabase.py); these just satisfy
      # Settings validation at import time.
      SUPABASE_URL: "https://example.supabase.co"
      SUPABASE_ANON_KEY: "test-anon-key"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  frontend-build:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_BASE_URL: /api
      # Dummy values — nothing in a production build actually calls out
      # to Supabase or the API; this just needs to satisfy
      # supabaseClient.js's "fail loudly if missing" check so the build
      # doesn't log spurious console errors.
      VITE_SUPABASE_URL: "https://example.supabase.co"
      VITE_SUPABASE_ANON_KEY: "test-anon-key"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  docker-build:
    name: Docker image build check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [backend-tests, frontend-build, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: safeprompt-ai-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: safeprompt-ai-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_SUPABASE_URL=https://example.supabase.co
            VITE_SUPABASE_ANON_KEY=test-anon-key
