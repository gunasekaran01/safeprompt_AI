# Nginx config for the SafePrompt AI frontend container.
#
# Two responsibilities:
#   1. Serve the built React SPA (copied into /usr/share/nginx/html by
#      the Dockerfile's build stage), falling back to index.html for any
#      unmatched path so client-side routing (react-router-dom — see
#      frontend/src/App.jsx) works correctly on a hard refresh or a
#      directly-visited deep link like /history.
#   2. Reverse-proxy /api/* to the backend container (Docker Compose
#      service name "backend", port 8000 — see docker-compose.yml), so
#      the browser only ever talks to this one origin. This mirrors what
#      the Vite dev server's proxy does in development
#      (frontend/vite.config.js) — apiClient.js's relative "/api" base
#      URL works unchanged in both environments.
#
# TLS is intentionally NOT configured here: in most deployments (see
# DEPLOYMENT.md) this container sits behind a managed load balancer or a
# separate TLS-terminating reverse proxy (a cloud provider's HTTPS load
# balancer, or Certbot + a proxy in front of this one). If this container
# needs to terminate TLS itself instead, add a second `server` block on
# 443 with `ssl_certificate` / `ssl_certificate_key`, and redirect this
# port-80 block to it with `return 301 https://$host$request_uri;`.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Vite content-hashes every filename under /assets/, so these are
    # safe to cache aggressively — a new deploy produces new filenames,
    # never a stale cache hit.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html itself must NOT be cached the same way, or returning
    # visitors would keep loading an old shell that references
    # since-deleted hashed asset filenames from a previous deploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # PDF report generation (GET /api/reports/{id}) can take a few
        # seconds to render — give the backend more headroom than
        # Nginx's 60s proxy_read_timeout default before giving up.
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
